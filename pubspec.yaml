name: ShEC_CSE
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: '>=3.11.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  http: ^1.6.0
  html: ^0.15.6
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  intl: ^0.19.0
  flutter_local_notifications: ^21.0.0
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.1
  image: ^4.8.0
  supabase: ^2.10.6
  shared_preferences: ^2.5.5
  aws_s3_api: ^2.0.0
  hidden_drawer_menu: ^3.0.1
  google_nav_bar: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/
    - assets/committee_members/
    - assets/gallery/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/logo.png"

  # Optional but recommended for Android 8.0+ (Adaptive Icons)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/logo.png"