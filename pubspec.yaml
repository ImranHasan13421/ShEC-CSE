name: ShEC_CSE
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  http: ^1.6.0
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/splash.gif

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png" # Path to your high-res logo

  # Optional but recommended for Android 8.0+ (Adaptive Icons)
  adaptive_icon_background: "#FFFFFF" # Or your preferred background color/image
  adaptive_icon_foreground: "assets/logo.png"